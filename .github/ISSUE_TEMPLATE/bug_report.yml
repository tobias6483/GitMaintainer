name: Bug report
description: Report incorrect output, scoring, or CLI behavior.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected.
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command
      placeholder: gitmaintainer owner/repo --json
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: Repository checked
      placeholder: owner/repo
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: CLI output
      render: shell
  - type: dropdown
    id: token
    attributes:
      label: Was `GITHUB_TOKEN` used?
      options:
        - "No"
        - "Yes, but not shared here"
        - "Unknown"
    validations:
      required: true
