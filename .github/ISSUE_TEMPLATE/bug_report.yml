name: Bug report
description: Report incorrect output, scoring, or CLI behavior.
title: "Bug: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected.
    validations:
      required: true
  - type: input
    id: repo
    attributes:
      label: Repository checked
      placeholder: owner/repo
  - type: textarea
    id: output
    attributes:
      label: CLI output
      render: shell
